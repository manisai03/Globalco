spring:
  application:
    name: job-board
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:globalco-job-board-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  openai:
    api-key: ${OPENAI_API_KEY:}
    enabled: ${OPENAI_ENABLED:false}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@jobboard.app}}
  brevo:
    api-key: ${BREVO_API_KEY:}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
    folder: ${CLOUDINARY_FOLDER:job-board/avatars}

---
spring:
  config:
    activate:
      on-profile: mysql
    import: optional:file:./mysql-local.yml,optional:file:./mail-local.yml,optional:file:./cloudinary-local.yml
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/jobboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: false
          starttls:
            enable: true
            required: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
