services:
  - type: web
    name: globalco-job-board-api
    runtime: java
    rootDir: backend
    buildCommand: mvn -B clean package -DskipTests
    startCommand: java -jar target/job-board-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
